<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>巴士實時監測看板 V3.4</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto; /* 確保字體放大後喺唔同螢幕都能正常看清 */
        }
        /* 頂部時間列 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px 15px 10px;
            font-size: 1.4rem;
            color: #8e8e93;
        }
        .live-clock { color: #ffffff; font-weight: bold; }
        
        /* 右側控制組 */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .add-slot-btn {
            background-color: #34c759;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .add-slot-btn:active { transform: scale(0.95); }
        
        /* 動態網格 layout */
        .grid-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 1fr;
            gap: 20px;
        }
        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        /* 巴士卡片 */
        .bus-card {
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .bus-card:active { transform: scale(0.98); }
        .bus-card.kmb { background-color: #922324; color: #ffffff; }
        .bus-card.ctb { background-color: #f2be38; color: #1c1c1e; }
        
        /* 1. 頂部佈局調整為垂直堆疊 */
        .card-top { display: flex; flex-direction: column; gap: 8px; min-width: 0; width: 100%; }
        
        /* 1. 路線號碼與往邊度放同一行 */
        .route-row { display: flex; align-items: center; gap: 12px; min-width: 0; width: 100%; }
        
        /* 1. 統一設定 2.4rem 確保路線、往邊度、站名完全一樣咁高咁大 */
        .route-badge {
            background: #ffffff; color: #000000; border-radius: 16px;
            font-size: 2.4rem; font-weight: 900; padding: 4px 16px;
            text-align: center; flex-shrink: 0;
        }
        .dest-name { font-size: 2.4rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        
        /* 1. 站名放喺下一行，字體與路線一樣大 */
        .stop-name { font-size: 2.4rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        
        /* 雙層時間佈局 */
        .card-bottom { display: flex; flex-direction: column; margin-top: 15px; }
        
        /* 2. 到站時間與倒數時間嘅 Label 樣式 */
        .time-section-label { font-size: 0.95rem; font-weight: bold; opacity: 0.75; margin-bottom: 4px; }
        
        .arrival-row, .countdown-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }
        
        /* 確保左右文字對齊 */
        .arrival-row span:first-child, .countdown-row span:first-child { text-align: left; }
        .arrival-row span:last-child, .countdown-row span:last-child { text-align: right; }
        
        .arrival-row { opacity: 0.9; margin-bottom: 8px; }
        
        /* 進度條 */
        .progress-bar { width: 100%; height: 4px; border-radius: 2px; position: relative; display: flex; align-items: center; margin-top: 4px; }
        .kmb .progress-bar { background: rgba(255,255,255,0.3); }
        .ctb .progress-bar { background: rgba(0,0,0,0.15); }
        .dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; }
        .kmb .dot { background: #ffffff; }
        .ctb .dot { background: #1c1c1e; }
        .dot.start { left: 0; } .dot.end { right: 0; }

        .countdown-row { margin-top: 8px; margin-bottom: 4px; }

        /* 智能搵站彈出視窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1c1c1e; color: white; padding: 25px; border-radius: 24px;
            width: 95%; max-width: 500px; max-height: 90vh; display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2c2c2e;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; font-weight: bold; }
        .close-btn { cursor: pointer; font-size: 1.6rem; color: #8e8e93; }
        
        .search-box { display: flex; gap: 10px; }
        .search-box select { background: #2c2c2e; color: white; border: 1px solid #3a3a3c; padding: 10px; border-radius: 12px; font-size: 1rem; }
        .search-box input { flex-grow: 1; background: #2c2c2e; color: white; border: 1px solid #3a3a3c; padding: 10px 15px; border-radius: 12px; font-size: 1.1rem; outline: none; }
        .search-btn { background: #007aff; color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .wizard-title { font-size: 1rem; color: #8e8e93; margin-top: 2px; margin-bottom: -4px; font-weight: bold; }
        .list-container {
            background: #2c2c2e; border-radius: 16px; max-height: 180px; overflow-y: auto;
            border: 1px solid #3a3a3c; display: flex; flex-direction: column;
        }
        .list-item {
            padding: 12px 16px; border-bottom: 1px solid #3a3a3c; cursor: pointer; font-size: 1.05rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:active { background: #3a3a3c; }
        .list-item .stop-code { font-size: 0.85rem; color: #8e8e93; }

        /* 刪除按鈕 */
        .clear-btn {
            background-color: #ff3b30; color: #ffffff; border: none; padding: 12px;
            border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            text-align: center; margin-top: 5px; display: none;
        }
        .clear-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-bar">
        <div>現在時間: <span id="current-clock" class="live-clock">00:00:00</span></div>
        <div class="header-controls">
            <button class="add-slot-btn" onclick="openModalForAdd()">+ 新增監測</button>
            <div id="update-clock">最後更新: --:--:--</div>
        </div>
    </div>

    <div class="grid-container" id="board-container"></div>

    <div class="modal-overlay" id="config-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title">設定巴士格</span>
                <span class="close-btn" onclick="closeModal()">✕</span>
            </div>
            <input type="hidden" id="slot-index">
            
            <div class="search-box">
                <select id="search-company">
                    <option value="KMB">九巴</option>
                    <option value="CTB">城巴</option>
                </select>
                <input type="text" id="search-route" placeholder="請輸入巴士線 (例如: 11X, 26)">
                <button class="search-btn" onclick="searchRoute()">搜尋</button>
            </div>

            <div class="wizard-title">第一步：選擇路線與方向 (Route)</div>
            <div class="list-container" id="route-results-list">
                <div style="padding:15px; color:#8e8e93; text-align:center;">請在上方輸入路線並按搜尋</div>
            </div>

            <div class="wizard-title">第二步：選擇你想監測的車站 (Stop)</div>
            <div class="list-container" id="stop-results-list">
                <div style="padding:15px; color:#8e8e93; text-align:center;">請先完成第一步</div>
            </div>

            <button class="clear-btn" id="modal-clear-btn" onclick="clearCurrentSlot()">🗑️ 清除此格子資料 (刪除)</button>
        </div>
    </div>

    <script>
        // 初始化預設 6 個看板格子
        const DEFAULT_CONFIG = [
            { company: "KMB", route: "11X", stopId: "6015A206A42E436F", dir: "O", serviceType: "1", stopName: "鶴園東街", dest: "安泰(北)" },
            { company: "KMB", route: "15",  stopId: "6015A206A42E436F", dir: "I", serviceType: "1", stopName: "紅磡家維邨", dest: "平田" },
            { company: "KMB", route: "93K", stopId: "6015A206A42E436F", dir: "O", serviceType: "1", stopName: "紅磡山谷道", dest: "寶林" },
            { company: "KMB", route: "14",  stopId: "6015A206A42E436F", dir: "O", serviceType: "1", stopName: "紅磡山谷道", dest: "鯉魚門邨" },
            { company: "CTB", route: "A22", stopId: "001507",           dir: "I", serviceType: "1", stopName: "山谷道", dest: "藍田站" },
            { company: "KMB", route: "2E",  stopId: "6015A206A42E436F", dir: "O", serviceType: "1", stopName: "紅磡山谷道", dest: "九龍城碼頭" }
        ];

        let busConfig = JSON.parse(localStorage.getItem('bus_board_config_v3')) || DEFAULT_CONFIG;
        let globalEtas = []; 
        let isFetchingFlags = []; 
        let tempStopNames = {}; 

        let kmbRoutesCache = null;
        let kmbRouteStopsCache = null;
        let kmbStopsMap = {};
        let ctbStopsMap = {}; 

        // 建立並渲染主畫面 (1 & 2. 已根據新佈局與 Label 要求更新)
        function initBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = "";
            
            while (globalEtas.length < busConfig.length) globalEtas.push([null, null]);
            while (isFetchingFlags.length < busConfig.length) isFetchingFlags.push(false);

            if (busConfig.length === 0) {
                container.innerHTML = `<div style="grid-column: span 3; text-align:center; padding:5vh; color:#8e8e93; font-size:1.5rem;">現時沒有監測路線，請按右上角「+ 新增監測」</div>`;
                return;
            }

            busConfig.forEach((bus, index) => {
                const card = document.createElement('div');
                card.className = `bus-card ${bus.company.toLowerCase()}`;
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <div class="card-top">
                        <div class="route-row">
                            <div class="route-badge">${bus.route}</div>
                            <div class="dest-name">往 ${bus.dest || '未設定'}</div>
                        </div>
                        <div class="stop-name">${bus.stopName}</div>
                    </div>
                    <div class="card-bottom">
                        <div class="time-section-label">預估到站時間</div>
                        <div class="arrival-row">
                            <span id="arrival-${index}-0">--:--</span>
                            <span id="arrival-${index}-1">--:--</span>
                        </div>
                        <div class="progress-bar"><div class="dot start"></div><div class="dot end"></div></div>
                        <div class="countdown-row">
                            <span id="countdown-${index}-0">--:--</span>
                            <span id="countdown-${index}-1">--:--</span>
                        </div>
                        <div class="time-section-label">倒數仲有幾耐到站</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 實時倒數器驅動引擎 (每秒執行)
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-clock').innerText = now.toTimeString().split(' ')[0];

            busConfig.forEach((bus, index) => {
                const etas = globalEtas[index] || [null, null];
                
                [0, 1].forEach(busNum => {
                    const etaTimeStr = etas[busNum];
                    const arrivalEl = document.getElementById(`arrival-${index}-${busNum}`);
                    const countdownEl = document.getElementById(`countdown-${index}-${busNum}`);

                    if (!arrivalEl || !countdownEl) return;
                    if (!etaTimeStr) {
                        arrivalEl.innerText = "--:--";
                        countdownEl.innerText = "--:--";
                        return;
                    }

                    if (etaTimeStr === "NONE") {
                        arrivalEl.innerText = "--:--";
                        countdownEl.innerText = busNum === 0 ? "暫無班次" : "暫無";
                        return;
                    }

                    const diffMs = Date.parse(etaTimeStr) - Date.now();
                    const targetDate = new Date(etaTimeStr);
                    
                    const hrs = String(targetDate.getHours()).padStart(2, '0');
                    const minsStr = String(targetDate.getMinutes()).padStart(2, '0');
                    arrivalEl.innerText = `${hrs}:${minsStr}`;

                    if (diffMs <= 0) {
                        countdownEl.innerText = "即將到站";
                    } else {
                        const totalSecs = Math.floor(diffMs / 1000);
                        const mins = Math.floor(totalSecs / 60);
                        const secs = totalSecs % 60;
                        countdownEl.innerText = `${mins}:${String(secs).padStart(2, '0')}`;
                    }
                });
            });
        }, 1000);

        // 核心同步網路數據
        async function fetchAPI() {
            if (busConfig.length === 0) return;
            
            const now = new Date();
            document.getElementById('update-clock').innerText = `最後更新: ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

            busConfig.forEach(async (bus, index) => {
                if (isFetchingFlags[index]) return;
                isFetchingFlags[index] = true;

                let url = bus.company === "KMB"
                    ? `https://data.etabus.gov.hk/v1/transport/kmb/eta/${bus.stopId}/${bus.route}/${bus.serviceType || 1}`
                    : `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${bus.stopId}/${bus.route}`;

                try {
                    const res = await fetch(url);
                    const result = await res.json();
                    const rawData = result.data || [];
                    const validEtas = rawData.filter(item => item.dir === bus.dir && item.eta);

                    globalEtas[index] = [
                        validEtas[0] ? validEtas[0].eta : "NONE",
                        validEtas[1] ? validEtas[1].eta : "NONE"
                    ];
                } catch (e) {
                    console.error("Fetch ETA Error: ", e);
                } finally {
                    isFetchingFlags[index] = false; 
                }
            });
        }

        // 刪除目前格子
        function clearCurrentSlot() {
            const index = parseInt(document.getElementById('slot-index').value);
            if (!isNaN(index) && index < busConfig.length) {
                busConfig.splice(index, 1);
                globalEtas.splice(index, 1);
                isFetchingFlags.splice(index, 1);
                
                localStorage.setItem('bus_board_config_v3', JSON.stringify(busConfig));
                closeModal();
                initBoard();
                fetchAPI();
            }
        }

        // 開啟新增模式
        function openModalForAdd() {
            const nextIdx = busConfig.length;
            document.getElementById('slot-index').value = nextIdx;
            document.getElementById('modal-title').innerText = `新增第 ${nextIdx + 1} 個巴士監測格`;
            document.getElementById('search-route').value = "";
            document.getElementById('modal-clear-btn').style.display = "none";
            document.getElementById('route-results-list').innerHTML = `<div style="padding:15px; color:#8e8e93; text-align:center;">請在上方輸入路線並按搜尋</div>`;
            document.getElementById('stop-results-list').innerHTML = `<div style="padding:15px; color:#8e8e93; text-align:center;">請先完成第一步</div>`;
            document.getElementById('config-modal').style.display = 'flex';
        }

        function openModal(index) {
            document.getElementById('slot-index').value = index;
            document.getElementById('modal-title').innerText = `修改第 ${index + 1} 格巴士設定`;
            document.getElementById('search-route').value = busConfig[index].route;
            document.getElementById('search-company').value = busConfig[index].company;
            document.getElementById('modal-clear-btn').style.display = "block";
            document.getElementById('route-results-list').innerHTML = `<div style="padding:15px; color:#8e8e93; text-align:center;">請在上方輸入路線並按搜尋</div>`;
            document.getElementById('stop-results-list').innerHTML = `<div style="padding:15px; color:#8e8e93; text-align:center;">請先完成第一步</div>`;
            document.getElementById('config-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('config-modal').style.display = 'none';
        }

        function selectAndSaveStop(company, route, bound, serviceType, stopId, destName) {
            const index = parseInt(document.getElementById('slot-index').value);
            const stopName = tempStopNames[stopId] || stopId;

            const newCard = {
                company: company, route: route, dir: bound,
                serviceType: serviceType, stopId: stopId, stopName: stopName, dest: destName
            };

            if (index >= busConfig.length) {
                busConfig.push(newCard);
            } else {
                busConfig[index] = newCard;
            }

            localStorage.setItem('bus_board_config_v3', JSON.stringify(busConfig));
            closeModal();
            initBoard();
            fetchAPI(); 
        }

        // 智能搵站核心
        async function searchRoute() {
            const company = document.getElementById('search-company').value;
            const route = document.getElementById('search-route').value.trim().toUpperCase();
            if (!route) return alert("請先輸入路線號碼！");

            const routeListContainer = document.getElementById('route-results-list');
            const stopListContainer = document.getElementById('stop-results-list');
            
            routeListContainer.innerHTML = `<div style="padding:15px; color:#007aff; text-align:center;">🔍 正在連線開放數據庫...</div>`;
            stopListContainer.innerHTML = `<div style="padding:15px; color:#8e8e93; text-align:center;">請先完成第一步</div>`;

            try {
                if (company === "KMB") {
                    if (!kmbRoutesCache) {
                        routeListContainer.innerHTML = `<div style="padding:15px; color:#f2be38; text-align:center;">⏳ 首次同步九巴路線庫 (約需 1-2 秒)...</div>`;
                        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route");
                        const json = await res.json();
                        kmbRoutesCache = json.data || [];
                    }

                    const filtered = kmbRoutesCache.filter(r => r.route === route);
                    if (filtered.length === 0) {
                        routeListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">❌ 找不到該九巴路線</div>`;
                        return;
                    }

                    routeListContainer.innerHTML = filtered.map(r => {
                        const displayLabel = `${r.route} : ${r.orig_tc} ➔ ${r.dest_tc} (班次 ${r.service_type})`;
                        return `
                            <div class="list-item" onclick="loadStops('KMB', '${r.route}', '${r.bound}', '${r.service_type}', '${r.dest_tc}')">
                                <span>${displayLabel}</span>
                                <span style="color:#ff3b30; font-weight:bold;">選擇 ➔</span>
                            </div>
                        `;
                    }).join('');

                } else {
                    const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route/CTB/${route}`);
                    const json = await res.json();
                    const r = json.data;

                    if (!r || Object.keys(r).length === 0) {
                        routeListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">❌ 找不到該城巴路線</div>`;
                        return;
                    }

                    const dataArr = Array.isArray(r) ? r : [r];
                    routeListContainer.innerHTML = dataArr.map(item => `
                        <div class="list-item" onclick="loadStops('CTB', '${item.route}', 'outbound', '1', '${item.dest_tc}')">
                            <span>${item.route} : ${item.orig_tc} ➔ ${item.dest_tc} (去程)</span>
                            <span style="color:#f2be38; font-weight:bold;">選擇 ➔</span>
                        </div>
                        <div class="list-item" onclick="loadStops('CTB', '${item.route}', 'inbound', '1', '${item.orig_tc}')">
                            <span>${item.route} : ${item.dest_tc} ➔ ${item.orig_tc} (回程)</span>
                            <span style="color:#f2be38; font-weight:bold;">選擇 ➔</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error(e);
                routeListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">⚠️ 連線失敗，請檢查網路</div>`;
            }
        }

        async function loadStops(company, route, bound, serviceType, destName) {
            const stopListContainer = document.getElementById('stop-results-list');
            stopListContainer.innerHTML = `<div style="padding:15px; color:#007aff; text-align:center;">⏳ 正在撈取巴士站清單...</div>`;

            try {
                if (company === "KMB") {
                    if (!kmbRouteStopsCache) {
                        stopListContainer.innerHTML = `<div style="padding:15px; color:#f2be38; text-align:center;">⏳ 首次同步九巴全港站點鏈接...</div>`;
                        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route-stop");
                        const json = await res.json();
                        kmbRouteStopsCache = json.data || [];
                    }
                    if (Object.keys(kmbStopsMap).length === 0) {
                        stopListContainer.innerHTML = `<div style="padding:15px; color:#f2be38; text-align:center;">⏳ 首次解析九巴繁體中文站名...</div>`;
                        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop");
                        const json = await res.json();
                        (json.data || []).forEach(s => { kmbStopsMap[s.stop] = s.name_tc; });
                    }

                    const filteredStops = kmbRouteStopsCache.filter(s => s.route === route && s.bound === bound && String(s.service_type) === String(serviceType));
                    filteredStops.sort((a, b) => a.seq - b.seq);

                    if (filteredStops.length === 0) {
                        stopListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">❌ 找不到該方向的車站數據</div>`;
                        return;
                    }

                    tempStopNames = {};
                    stopListContainer.innerHTML = filteredStops.map(s => {
                        const name = kmbStopsMap[s.stop] || "未知車站";
                        tempStopNames[s.stop] = name;
                        return `
                            <div class="list-item" onclick="selectAndSaveStop('KMB','${route}','${bound}','${serviceType}','${s.stop}','${destName}')">
                                <div>
                                    <span style="color:#8e8e93; font-weight:bold;">${s.seq}.</span>
                                    <span style="font-weight:bold; margin-left:8px;">${name}</span>
                                </div>
                                <span class="stop-code">${s.stop}</span>
                            </div>
                        `;
                    }).join('');

                } else {
                    const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route-stop/CTB/${route}/${bound}`);
                    const json = await res.json();
                    const stops = json.data || [];

                    if (stops.length === 0) {
                        stopListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">❌ 無法載入城巴車站數據</div>`;
                        return;
                    }

                    tempStopNames = {};
                    stopListContainer.innerHTML = stops.map(s => {
                        const cachedName = ctbStopsMap[s.stop];
                        const displayName = cachedName || "站名載入中...";
                        if (cachedName) tempStopNames[s.stop] = cachedName;
                        
                        return `
                            <div class="list-item" id="ctb-stop-${s.stop}" onclick="selectAndSaveStop('CTB','${route}','${bound === 'outbound' ? 'O' : 'I'}','1','${s.stop}','${destName}')">
                                <div>
                                    <span style="color:#8e8e93; font-weight:bold;">${s.seq}.</span>
                                    <span class="ctb-name-span" style="font-weight:bold; margin-left:8px;">${displayName}</span>
                                </div>
                                <span class="stop-code">${s.stop}</span>
                            </div>
                        `;
                    }).join('');

                    stops.forEach(s => {
                        if (ctbStopsMap[s.stop]) return;
                        fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/stop/${s.stop}`)
                            .then(r => r.json())
                            .then(result => {
                                const name = result.data?.name_tc || "未知車站";
                                ctbStopsMap[s.stop] = name;
                                tempStopNames[s.stop] = name;
                                const row = document.getElementById(`ctb-stop-${s.stop}`);
                                if (row) row.querySelector('.ctb-name-span').innerText = name;
                            }).catch(() => {
                                const row = document.getElementById(`ctb-stop-${s.stop}`);
                                if (row) row.querySelector('.ctb-name-span').innerText = s.stop;
                            });
                    });
                }
            } catch (e) {
                console.error(e);
                stopListContainer.innerHTML = `<div style="padding:15px; color:#ff3b30; text-align:center;">❌ 載入車站失敗</div>`;
            }
        }

        // 啟動監測看板
        initBoard();
        fetchAPI();
        setInterval(fetchAPI, 10000); // 後台數據每 10 秒刷新一次

        // 3. 每 30 秒全頁資料自動重新整理 (30000 毫秒)，徹底根治過站不更新嘅問題
        setInterval(function() {
            window.location.reload();
        }, 30000);
    </script>
</body>
</html>
