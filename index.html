<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 實時巴士動態看板 ⚡</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .loading-shimmer { animation: shimmer 1.5s infinite linear; background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto">

    <div class="bg-slate-800 p-4 rounded-2xl shadow-xl mb-6 border border-slate-700">
        <h1 class="text-xl font-bold text-center mb-4 text-amber-400 flex items-center justify-center gap-2">
            🚌 實時巴士看板 (GitHub 直連版)
        </h1>
        <div class="flex gap-2">
            <select id="companySelect" class="bg-slate-900 border border-slate-600 text-white px-3 py-2 rounded-xl text-base focus:outline-none focus:border-amber-400">
                <option value="KMB">九巴/龍運</option>
                <option value="CTB">城巴</option>
            </select>
            <input type="text" id="routeInput" placeholder="輸入路線 (如: 1A, 11X, E22)" 
                   class="flex-1 bg-slate-900 border border-slate-600 text-white px-4 py-2 rounded-xl text-base focus:outline-none focus:border-amber-400 placeholder-slate-500 uppercase">
            <button onclick="searchRoute()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-6 py-2 rounded-xl transition duration-200 cursor-pointer">
                搜尋
            </button>
        </div>
    </div>

    <div id="directionContainer" class="grid grid-cols-2 gap-3 mb-6 hidden"></div>

    <div id="statusMessage" class="text-center text-slate-400 my-4 text-sm hidden"></div>

    <div id="stopListContainer" class="bg-slate-800/60 rounded-2xl p-4 shadow-xl border border-slate-700/50 hidden">
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
            <span class="text-xs text-slate-400 flex items-center gap-1">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                每 10 秒自動更新
            </span>
            <button onclick="refreshETA()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-lg text-amber-400 transition cursor-pointer">
                🔄 手動更新
            </button>
        </div>
        <div id="stopsLoop" class="space-y-3"></div>
    </div>

    <script>
        // 全局快取暫存，避免重覆下載相同車站名造成卡頓
        const globalStopCache = {};
        let currentQuery = { company: '', route: '', bound: '', serviceType: '1', stops: [] };
        let autoRefreshTimer = null;

        // 搜尋路線入口
        async function searchRoute() {
            const company = document.getElementById('companySelect').value;
            const route = document.getElementById('routeInput').value.trim().toUpperCase();
            
            if (!route) return alert('請先輸入巴士路線！');
            
            showStatus('🔍 正在即時抓取路線資料...');
            hideElements(['directionContainer', 'stopListContainer']);
            clearInterval(autoRefreshTimer);

            try {
                if (company === 'KMB') {
                    await loadKmbRoute(route);
                } else {
                    await loadCtbRoute(route);
                }
            } catch (err) {
                console.error(err);
                showStatus('❌ 找不到該路線或連線失敗，請檢查輸入是否正確。');
            }
        }

        // =================【九巴 KMB 核心處理邏輯】=================
        async function loadKmbRoute(route) {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route`);
            const json = await res.json();
            const matchingRoutes = json.data.filter(r => r.route === route);

            if (matchingRoutes.length === 0) throw new Error('Route not found');

            const dirContainer = document.getElementById('directionContainer');
            dirContainer.innerHTML = '';

            matchingRoutes.forEach(rt => {
                const btn = document.createElement('button');
                btn.className = "bg-slate-700 hover:bg-slate-600 text-sm font-medium py-3 px-4 rounded-xl text-center border border-transparent hover:border-amber-400 transition cursor-pointer text-slate-100";
                btn.innerHTML = `<span class="text-xs block text-slate-400">往</span> <strong class="text-base text-amber-300">${rt.dest_tc}</strong>`;
                btn.onclick = () => selectKmbDirection(rt.route, rt.bound, rt.service_type);
                dirContainer.appendChild(btn);
            });

            dirContainer.classList.remove('hidden');
            showStatus('💡 請選取前往的方向');
        }

        async function selectKmbDirection(route, bound, serviceType) {
            showStatus('⏳ 正在生成中途站名及順序...');
            const dirPath = bound === 'O' ? 'outbound' : 'inbound';
            
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${dirPath}/${serviceType}`);
            const json = await res.json();
            
            currentQuery = { company: 'KMB', route, bound, serviceType, stops: json.data };
            await renderStopsStructure();
        }

        // =================【城巴 CTB 核心處理邏輯】=================
        async function loadCtbRoute(route) {
            const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route/CTB/${route}`);
            const json = await res.json();
            
            if (!json.data) throw new Error('Route not found');
            const rt = json.data;

            const dirContainer = document.getElementById('directionContainer');
            dirContainer.innerHTML = '';

            const directions = [
                { dir: 'outbound', label: rt.dest_tc },
                { dir: 'inbound', label: rt.orig_tc }
            ];

            directions.forEach(d => {
                const btn = document.createElement('button');
                btn.className = "bg-slate-700 hover:bg-slate-600 text-sm font-medium py-3 px-4 rounded-xl text-center border border-transparent hover:border-amber-400 transition cursor-pointer text-slate-100";
                btn.innerHTML = `<span class="text-xs block text-slate-400">往</span> <strong class="text-base text-amber-300">${d.label}</strong>`;
                btn.onclick = () => selectCtbDirection(route, d.dir);
                dirContainer.appendChild(btn);
            });

            dirContainer.classList.remove('hidden');
            showStatus('💡 請選取前往的方向');
        }

        async function selectCtbDirection(route, dir) {
            showStatus('⏳ 正在生成中途站名及順序...');
            const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route-stop/CTB/${route}/${dir}`);
            const json = await res.json();

            currentQuery = { company: 'CTB', route, bound: dir, serviceType: '1', stops: json.data };
            await renderStopsStructure();
        }

        // =================【渲染站點主介面】=================
        async function renderStopsStructure() {
            hideElements(['statusMessage']);
            const container = document.getElementById('stopsLoop');
            container.innerHTML = '';
            
            document.getElementById('stopListContainer').classList.remove('hidden');

            currentQuery.stops.forEach(st => {
                const div = document.createElement('div');
                div.id = `stop-row-${st.seq}`;
                // 🛠️ 修正點：加強 flex 佈局，給予右邊時間區塊更寬充裕嘅空間 (min-w-[120px])
                div.className = "flex items-center justify-between p-3 bg-slate-900/60 rounded-xl border border-slate-700/40 gap-4";
                div.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0 flex-1">
                        <span class="w-6 h-6 shrink-0 bg-slate-700 text-slate-300 rounded-full flex items-center justify-center text-xs font-bold">${st.seq}</span>
                        <div class="min-w-0 flex-1">
                            <div class="w-32 h-4 loading-shimmer rounded" id="name-shimmer-${st.seq}"></div>
                        </div>
                    </div>
                    <div class="text-right font-mono font-bold text-amber-400 text-base shrink-0 min-w-[130px] flex flex-col items-end justify-center" id="eta-val-${st.seq}">--:--</div>
                `;
                container.appendChild(div);
            });

            const namePromises = currentQuery.stops.map(async (st) => {
                let stopName = '';
                const stopId = st.stop;

                if (globalStopCache[stopId]) {
                    stopName = globalStopCache[stopId];
                } else {
                    try {
                        const url = currentQuery.company === 'KMB' 
                            ? `https://data.etabus.gov.hk/v1/transport/kmb/stop/${stopId}`
                            : `https://rt.data.gov.hk/v1/transport/citybus-nwfb/stop/${stopId}`;
                        const r = await fetch(url);
                        const j = await r.json();
                        stopName = j.data.name_tc;
                        globalStopCache[stopId] = stopName;
                    } catch {
                        stopName = '未知站點 (' + stopId + ')';
                    }
                }
                const shimmer = document.getElementById(`name-shimmer-${st.seq}`);
                if (shimmer) {
                    const parent = shimmer.parentNode;
                    parent.innerHTML = `<span class="text-base font-semibold text-slate-200 block truncate">${stopName}</span>`;
                }
            });

            await Promise.all(namePromises);
            await refreshETA();

            // 🛠️ 修正點：計時器由 30000 縮短為 10000 (即 10 秒)
            autoRefreshTimer = setInterval(refreshETA, 10000);
        }

        // =================【實時到站時間 (ETA) 抓取邏輯】=================
        async function refreshETA() {
            if (!currentQuery.stops || currentQuery.stops.length === 0) return;

            try {
                if (currentQuery.company === 'KMB') {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${currentQuery.route}/${currentQuery.serviceType}`);
                    const json = await res.json();
                    const targetDir = currentQuery.bound; 
                    
                    currentQuery.stops.forEach(st => {
                        const matchedEtas = json.data.filter(e => e.stop === st.stop && e.dir === targetDir && e.seq === parseInt(st.seq));
                        updateStopEtaUI(st.seq, matchedEtas);
                    });
                } else {
                    const etaPromises = currentQuery.stops.map(async (st) => {
                        try {
                            const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${st.stop}/${currentQuery.route}`);
                            const json = await res.json();
                            const matchedEtas = json.data.filter(e => e.dir === currentQuery.bound);
                            updateStopEtaUI(st.seq, matchedEtas);
                        } catch (e) {
                            document.getElementById(`eta-val-${st.seq}`).innerHTML = `<div class="text-slate-500 text-xs text-right w-full">暫無班次</div>`;
                        }
                    });
                    await Promise.all(etaPromises);
                }
            } catch (err) {
                console.error('更新 ETA 失敗:', err);
            }
        }

        function updateStopEtaUI(seq, etas) {
            const etaCell = document.getElementById(`eta-val-${seq}`);
            if (!etaCell) return;

            if (!etas || etas.length === 0 || !etas[0].eta) {
                // 🛠️ 修正點：確保提示文字也有加上靠右 text-right
                etaCell.innerHTML = `<div class="text-xs text-slate-500 text-right w-full">尾班已過</div>`;
                return;
            }

            const now = new Date();
            let htmlResult = [];

            etas.slice(0, 2).forEach((e, idx) => {
                const etaTime = new Date(e.eta);
                const diffMs = etaTime - now;
                const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
                
                let minStr = diffMins === 0 ? "即將到站" : `${diffMins} 分鐘`;
                if (e.rmk_tc === "📅預定班次") minStr += " (預)";

                // 🛠️ 修正點：確保外層 div 都加上 text-right 同埋 w-full，等文字可以完美對齊右邊
                if (idx === 0) {
                    htmlResult.push(`<div class="text-amber-400 text-base font-bold text-right w-full whitespace-nowrap">${minStr}</div>`);
                } else {
                    htmlResult.push(`<div class="text-slate-400 text-xs mt-0.5 text-right w-full whitespace-nowrap">${minStr}</div>`);
                }
            });

            etaCell.innerHTML = htmlResult.join('');
        }

        function showStatus(msg) {
            const el = document.getElementById('statusMessage');
            el.innerText = msg;
            el.classList.remove('hidden');
        }
        function hideElements(ids) {
            ids.forEach(id => document.getElementById(id).classList.add('hidden'));
        }
    </script>
</body>
</html>
