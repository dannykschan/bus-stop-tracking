<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>巴士實時監測看板 V3.5</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #0b0b0c; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; padding: 24px; overflow: hidden; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 15px 10px; font-size: 1.4rem; color: #8e8e93; }
        .live-clock { color: #ffffff; font-weight: bold; }
        .header-controls { display: flex; align-items: center; gap: 20px; }
        .add-slot-btn { background-color: #34c759; color: #ffffff; border: none; padding: 8px 16px; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .grid-container { flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
        .bus-card { border-radius: 28px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 8px 24px rgba(0,0,0,0.4); cursor: pointer; }
        .bus-card.kmb { background-color: #922324; color: #ffffff; }
        .bus-card.ctb { background-color: #f2be38; color: #1c1c1e; }
        .card-top { display: flex; align-items: center; gap: 18px; }
        .route-badge { background: #ffffff; color: #000000; border-radius: 16px; font-size: 2.4rem; font-weight: 900; padding: 10px 0; width: 100px; text-align: center; }
        .info-block { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .stop-name { font-size: 1.4rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dest-name { font-size: 1.2rem; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-bottom { display: flex; flex-direction: column; margin-top: 15px; }
        .arrival-row, .countdown-row { display: flex; justify-content: space-between; font-size: 1.6rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .arrival-row span:first-child, .countdown-row span:first-child { text-align: left; flex: 1; }
        .arrival-row span:last-child, .countdown-row span:last-child { text-align: right; flex: 1; }
        .progress-bar { width: 100%; height: 4px; border-radius: 2px; position: relative; margin: 8px 0; display: flex; align-items: center; }
        .kmb .progress-bar { background: rgba(255,255,255,0.3); } .ctb .progress-bar { background: rgba(0,0,0,0.15); }
        .dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; }
        .kmb .dot { background: #ffffff; } .ctb .dot { background: #1c1c1e; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1c1c1e; color: white; padding: 25px; border-radius: 24px; width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 14px; }
        .list-container { background: #2c2c2e; border-radius: 16px; max-height: 250px; overflow-y: auto; border: 1px solid #3a3a3c; }
        .list-item { padding: 12px 16px; border-bottom: 1px solid #3a3a3c; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div>現在時間: <span id="current-clock" class="live-clock">00:00:00</span></div>
        <div class="header-controls">
            <button class="add-slot-btn" onclick="openModalForAdd()">+ 新增監測</button>
            <div id="update-clock">最後更新: --:--:--</div>
        </div>
    </div>
    <div class="grid-container" id="board-container"></div>
    <div class="modal-overlay" id="config-modal">
        <div class="modal-content">
            <div class="modal-header"><span id="modal-title">設定巴士格</span><span class="close-btn" onclick="closeModal()">✕</span></div>
            <input type="hidden" id="slot-index">
            <div class="search-box" style="display:flex; gap:10px;">
                <select id="search-company" style="background:#2c2c2e; color:white; padding:10px; border-radius:12px;"><option value="KMB">九巴</option><option value="CTB">城巴</option></select>
                <input type="text" id="search-route" placeholder="路線(如: 11X)" style="flex-grow:1; background:#2c2c2e; color:white; padding:10px; border-radius:12px; border:1px solid #3a3a3c;">
                <button class="search-btn" onclick="searchRoute()" style="background:#007aff; color:white; border:none; padding:0 20px; border-radius:12px;">搜尋</button>
            </div>
            <div class="list-container" id="route-results-list"><div style="padding:15px; color:#8e8e93; text-align:center;">請在上方輸入路線並按搜尋</div></div>
            <div class="list-container" id="stop-results-list"><div style="padding:15px; color:#8e8e93; text-align:center;">請先完成第一步</div></div>
            <button id="modal-clear-btn" style="background:#ff3b30; color:white; border:none; padding:12px; border-radius:14px; margin-top:5px; display:none;" onclick="clearCurrentSlot()">🗑️ 清除此格</button>
        </div>
    </div>

    <script>
        let busConfig = JSON.parse(localStorage.getItem('bus_board_config_v3')) || [
            { company: "KMB", route: "11X", stopId: "6015A206A42E436F", dir: "O", serviceType: "1", stopName: "鶴園東街", dest: "安泰(北)" }
        ];
        let globalEtas = [];
        let kmbRoutesCache = null, kmbRouteStopsCache = null, kmbStopsMap = {}, ctbStopsMap = {}, tempStopNames = {};

        function saveConfig() { localStorage.setItem('bus_board_config_v3', JSON.stringify(busConfig)); }

        function initBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = "";
            busConfig.forEach((bus, index) => {
                const card = document.createElement('div');
                card.className = `bus-card ${bus.company.toLowerCase()}`;
                card.onclick = () => openModal(index);
                card.innerHTML = `<div class="card-top"><div class="route-badge">${bus.route}</div><div class="info-block"><div class="stop-name">${bus.stopName}</div><div class="dest-name">往 ${bus.dest || ''}</div></div></div><div class="card-bottom"><div class="arrival-row"><span id="arrival-${index}-0">--:--</span><span id="arrival-${index}-1">--:--</span></div><div class="progress-bar"><div class="dot start"></div><div class="dot end"></div></div><div class="countdown-row"><span id="countdown-${index}-0">--:--</span><span id="countdown-${index}-1">--:--</span></div></div>`;
                container.appendChild(card);
            });
        }

        async function fetchAPI() {
            document.getElementById('update-clock').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
            busConfig.forEach(async (bus, index) => {
                let url = bus.company === "KMB" ? `https://data.etabus.gov.hk/v1/transport/kmb/eta/${bus.stopId}/${bus.route}/${bus.serviceType || 1}` : `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${bus.stopId}/${bus.route}`;
                try {
                    const res = await fetch(url);
                    const result = await res.json();
                    const validEtas = (result.data || []).filter(item => item.dir === bus.dir && item.eta);
                    globalEtas[index] = [validEtas[0]?.eta || "NONE", validEtas[1]?.eta || "NONE"];
                    
                    [0,1].forEach(i => {
                        const arrEl = document.getElementById(`arrival-${index}-${i}`);
                        const cdnEl = document.getElementById(`countdown-${index}-${i}`);
                        if(!arrEl) return;
                        const eta = globalEtas[index][i];
                        if(eta === "NONE") { arrEl.innerText = "--:--"; cdnEl.innerText = "暫無"; return; }
                        const time = new Date(eta);
                        arrEl.innerText = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
                        const diff = Math.floor((time - new Date())/1000/60);
                        cdnEl.innerText = diff <= 0 ? "即將到站" : `${diff} 分鐘`;
                    });
                } catch(e) { console.error(e); }
            });
        }

        async function searchRoute() {
            const company = document.getElementById('search-company').value;
            const route = document.getElementById('search-route').value.trim().toUpperCase();
            const list = document.getElementById('route-results-list');
            list.innerHTML = "搜尋中...";
            try {
                if(company === "KMB") {
                    if(!kmbRoutesCache) kmbRoutesCache = (await (await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route")).json()).data;
                    list.innerHTML = kmbRoutesCache.filter(r => r.route === route).map(r => `<div class="list-item" onclick="loadStops('KMB','${r.route}','${r.bound}','${r.service_type}','${r.dest_tc}')"><span>${r.route}: ${r.orig_tc}➔${r.dest_tc}</span><span>選擇 ➔</span></div>`).join('');
                } else {
                    const data = (await (await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route/CTB/${route}`)).json()).data;
                    if(!data) list.innerHTML = "找不到路線";
                    else list.innerHTML = `<div class="list-item" onclick="loadStops('CTB','${route}','outbound','1','${data.dest_tc}')"><span>${route}: 去程</span></div><div class="list-item" onclick="loadStops('CTB','${route}','inbound','1','${data.orig_tc}')"><span>${route}: 回程</span></div>`;
                }
            } catch(e) { list.innerHTML = "連線失敗"; }
        }

        async function loadStops(company, route, bound, serviceType, destName) {
            const list = document.getElementById('stop-results-list');
            list.innerHTML = "載入車站中...";
            try {
                if(company === "KMB") {
                    if(Object.keys(kmbStopsMap).length === 0) (await (await fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop")).json()).data.forEach(s => kmbStopsMap[s.stop] = s.name_tc);
                    const stops = (await (await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route-stop")).json()).data.filter(s => s.route === route && s.bound === bound && s.service_type == serviceType);
                    list.innerHTML = stops.map(s => `<div class="list-item" onclick="addBus('${company}','${route}','${bound}','${serviceType}','${s.stop}','${kmbStopsMap[s.stop] || s.stop}','${destName}')"><span>${kmbStopsMap[s.stop]}</span></div>`).join('');
                } else {
                    const stops = (await (await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/route-stop/CTB/${route}/${bound}`)).json()).data;
                    list.innerHTML = stops.map(s => `<div class="list-item" id="stop-${s.stop}" onclick="addBus('${company}','${route}','${bound==='outbound'?'O':'I'}','1','${s.stop}','載入中...','${destName}')"><span>站點: ${s.stop}</span></div>`).join('');
                    stops.forEach(async s => {
                        const name = (await (await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/stop/CTB/${s.stop}`)).json()).data?.name_tc || s.stop;
                        const el = document.getElementById(`stop-${s.stop}`);
                        if(el) el.innerHTML = `<span>${name}</span>`;
                    });
                }
            } catch(e) { list.innerHTML = "載入失敗"; }
        }

        function addBus(company, route, dir, serviceType, stopId, stopName, dest) {
            busConfig.push({ company, route, dir, serviceType, stopId, stopName, dest });
            saveConfig();
            closeModal();
            initBoard();
            fetchAPI();
        }

        function openModalForAdd() { document.getElementById('config-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('config-modal').style.display = 'none'; }
        function clearCurrentSlot() { /* 若要實作刪除功能，可在此擴充 */ }

        setInterval(() => document.getElementById('current-clock').innerText = new Date().toTimeString().split(' ')[0], 1000);
        setInterval(fetchAPI, 10000);
        initBoard();
        fetchAPI();
    </script>
</body>
</html>
